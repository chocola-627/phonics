<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phonics Cards</title>
<style>
:root {
  --bg: #f5f3ef;
  --card-bg: #fff;
  --text: #2c2c2c;
  --text-light: #888;
  --accent: #d4a373;
  --accent-light: #faedcd;
  --border: #e8e0d4;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.container { max-width: 820px; margin: 0 auto; padding: 16px; }

/* header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  flex-wrap: wrap;
  gap: 10px;
}
.header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.version { font-size: 11px; font-weight: 600; color: var(--text-light); background: var(--accent-light); padding: 1px 7px; border-radius: 6px; line-height: 1.6; }
.header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.btn {
  padding: 6px 14px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: var(--card-bg);
  color: var(--text);
  box-shadow: var(--shadow);
  transition: all .15s;
}
.btn:hover { opacity: .8; }
.btn-active { background: var(--accent); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* filters */
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }

/* mode toggle */
.mode-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  background: var(--card-bg);
  padding: 4px;
  border-radius: 10px;
  box-shadow: var(--shadow);
}
.mode-btn {
  flex: 1;
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--text-light);
  transition: all .15s;
}
.mode-btn-active {
  background: var(--accent);
  color: #fff;
}

/* card wall grid */
.card-wall {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 10px;
}
.card-wall-tile {
  aspect-ratio: 1;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: all .2s;
  border: 2px solid transparent;
  position: relative;
  user-select: none;
}
.card-wall-tile:hover { transform: translateY(-2px); }
.card-wall-tile:active { transform: scale(.96); }
.tile-letter { background: #f0ebe3; }
.tile-short { background: #e8f0e8; }
.tile-long { background: #e8eef0; }
.tile-vowel { background: #ede8f0; }
.tile-consonant { background: #f0e8ec; }

/* card back (random mode) */
.card-back {
  background: linear-gradient(135deg, var(--accent-light), #e8d5c4);
  border: 2px solid var(--accent);
}
.card-back::after {
  content: "?";
  font-size: 24px;
  color: var(--accent);
  opacity: .5;
}
/* seen badge - only in random mode */
.card-wall-tile.seen-badge::before {
  content: attr(data-count);
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* detail view */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 72px;
  animation: fadeIn .15s;
}
.detail-card {
  position: relative;
  background: var(--card-bg);
  border-radius: 18px;
  max-width: 520px;
  width: 100%;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,.12);
  animation: slideUp .2s;
}

/* nav arrows - outside card */
.nav-arrow {
  position: absolute;
  top: 0;
  bottom: 0;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 36px;
  color: var(--text-light);
  z-index: 3;
  width: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .15s;
}
.nav-arrow:hover { color: var(--text); }
.nav-arrow-prev { left: -64px; }
.nav-arrow-next { right: -64px; }

/* big next button - random mode */
.nav-big-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  right: -80px;
  width: 64px;
  padding: 16px 6px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  z-index: 3;
  font-size: 14px;
  font-weight: 700;
  line-height: 1.4;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.1);
  transition: all .15s;
}
.nav-big-next:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); transform: translateY(-50%) translateX(-2px); }
.detail-top {
  flex-shrink: 0;
  padding: 20px 24px 0;
}
.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.detail-title-group {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.detail-title {
  font-size: 28px;
  font-weight: 800;
}
.detail-sound {
  font-size: 16px;
  color: var(--text-light);
  font-weight: 400;
}
.detail-header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.detail-close { font-size: 20px; padding: 4px 14px; }

/* translation toggle button - simple line art */
.cn-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: 1.5px solid var(--text-light);
  border-radius: 6px;
  padding: 2px 7px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  background: transparent;
  transition: all .15s;
  line-height: 1.4;
  letter-spacing: .5px;
}
.cn-toggle:hover { border-color: var(--accent); color: var(--accent); }
.cn-toggle.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* scrollable content */
.detail-scroll {
  overflow-y: auto;
  padding: 0 24px 16px;
  flex: 1;
}
.detail-items { display: flex; flex-direction: column; gap: 14px; }
.item-row {
  padding: 12px 14px;
  background: #faf8f6;
  border-radius: 10px;
  cursor: pointer;
  transition: background .15s;
}
.item-row:hover { background: #f4f0ea; }
.item-word {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 3px;
  display: inline-block;
}
.item-word .speaker { font-size: 14px; margin-left: 6px; opacity: .5; }
.item-sentence {
  font-size: 14px;
  color: #555;
  line-height: 1.5;
  margin-top: 3px;
}
.item-sentence .speaker { font-size: 12px; margin-left: 4px; opacity: .4; }
.item-cn {
  font-size: 13px;
  color: var(--text-light);
  display: none;
  margin-left: 6px;
}
.item-sc {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 1px;
  display: none;
}
.show-cn .item-cn { display: inline; }
.show-cn .item-sc { display: block; }

/* bottom bar */
.detail-nav {
  flex-shrink: 0;
  padding: 10px 24px;
  border-top: 1px solid var(--border);
}

/* empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
  font-size: 15px;
}

/* animations */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes flipIn {
  from { transform: perspective(600px) rotateY(90deg); opacity: 0; }
  to { transform: perspective(600px) rotateY(0); opacity: 1; }
}
.flip-anim { animation: flipIn .35s ease-out; }

/* stats bar */
.stats-bar {
  font-size: 12px;
  color: var(--text-light);
  text-align: center;
  padding: 8px 0;
  margin-top: 4px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.reset-counts {
  font-size: 11px;
  text-decoration: underline dotted;
  cursor: pointer;
  color: var(--text-light);
  opacity: .6;
}
.reset-counts:hover { opacity: 1; }

/* export/import */
.data-btn {
  position: relative;
}
.data-menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  background: var(--card-bg);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,.12);
  z-index: 10;
  min-width: 120px;
  overflow: hidden;
  margin-top: 4px;
}
.data-menu.show { display: block; }
.data-menu-item {
  padding: 10px 16px;
  font-size: 13px;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  color: var(--text);
  transition: background .1s;
}
.data-menu-item:hover { background: var(--accent-light); }
.data-menu-item:first-child { border-bottom: 1px solid var(--border); }
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--card-bg);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  z-index: 200;
  animation: fadeIn .2s;
  pointer-events: none;
}

@media (max-width: 480px) {
  .card-wall { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
  .detail-overlay { padding: 0 12px; }
  .detail-card { max-height: 90vh; }
  .detail-top { padding: 16px 16px 0; }
  .detail-scroll { padding: 0 16px 12px; }
  .detail-nav { padding: 8px 16px; }
  .detail-title { font-size: 24px; }
  .nav-arrow, .nav-big-next { display: none; }
}
</style>
</head>
<body>

</div>

// ==================== LOCAL STORAGE STATS ====================
function getWeekKey() {
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil((((d - start) / 86400000) + start.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${week}`;
}
function getStats() {
  const key = getWeekKey();
  const raw = JSON.parse(localStorage.getItem('phonics_stats') || '{}');
  if (raw.week !== key) return { week: key, counts: {} };
  return raw;
}
function saveStats(stats) {
  localStorage.setItem('phonics_stats', JSON.stringify(stats));
}
function incrementCount(id) {
  const stats = getStats();
  if (stats.week !== getWeekKey()) { stats.week = getWeekKey(); stats.counts = {}; }
  stats.counts[id] = (stats.counts[id] || 0) + 1;
  saveStats(stats);
}
function getCount(id) {
  const stats = getStats();
  return stats.counts[id] || 0;
}
function getAllCounts() {
  const stats = getStats();
  return stats.counts || {};
}
function resetCounts() {
  if (!confirm('Reset all stats for this week?')) return;
  const stats = getStats();
  stats.counts = {};
  saveStats(stats);
  if (state.mode === 'random') randomFlipped = {};
  renderWall();
}

// ==================== AUDIO ====================
const synth = window.speechSynthesis;

function speak(text) {
  if (!synth) return;

  const voices = synth.getVoices();
  const lang = state.voiceType === 'uk' ? 'en-GB' : 'en-US';

  // Voices not loaded yet — wait and retry
  if (voices.length === 0) {
    synth.addEventListener('voiceschanged', () => speak(text), { once: true });
    return;
  }

  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 0.8;

  // Cross-platform female voice names (macOS + iOS)
  const femaleNames = ['Samantha', 'Karen', 'Moira', 'Tessa', 'Kate', 'Flo', 'Sandy', 'Shelley', 'Grandma'];
  // Try: exact locale + female voice
  let voice = voices.find(v => v.lang.startsWith(lang) && femaleNames.some(n => v.name.includes(n)));
  // Try: any English locale + female (catches en-AU Karen / en-IE Moira / en-ZA Tessa on iOS for UK mode)
  if (!voice) voice = voices.find(v => v.lang.startsWith('en') && femaleNames.some(n => v.name.includes(n)));
  // Fallback: any voice for target locale
  if (!voice) voice = voices.find(v => v.lang.startsWith(lang));
  if (voice) u.voice = voice;

  synth.cancel();
  setTimeout(() => synth.speak(u), 10);
}

// ==================== FILTER ====================
function getFilteredCards() {
  if (state.filter === 'all') return CARDS;
  return CARDS.filter(c => c.cat === state.filter);
}

// ==================== RENDER: CARD WALL ====================
function renderWall() {
  const wall = document.getElementById('cardWall');
  const empty = document.getElementById('emptyState');
  const filtered = getFilteredCards();

  if (filtered.length === 0) {
    wall.innerHTML = '';
    empty.innerHTML = '<div class="empty-state">No cards in this category</div>';
    return;
  }
  empty.innerHTML = '';

  let html = '';
  for (const card of filtered) {
    const catClass = VOICE_GROUPS[card.cat]?.cls || 'tile-letter';
    const isBack = state.mode === 'random' && !randomFlipped[card.id];
    const seen = getCount(card.id);
    const showBadge = state.mode === 'random' && seen > 0;

    html += `<div class="card-wall-tile ${isBack ? 'card-back' : catClass} ${showBadge ? 'seen-badge' : ''}"
              data-count="${seen}" onclick="clickTile('${card.id}')">`;
    if (isBack) { html += ''; } else { html += card.label; }
    html += `</div>`;
  }
  wall.innerHTML = html;

  const total = filtered.length;
  let seenCount = 0, totalViews = 0;
  for (const card of filtered) {
    const c = getCount(card.id);
    if (c > 0) seenCount++; totalViews += c;
  }
  const bar = document.getElementById('statsBar');
  if (state.mode === 'random') {
    const unflipped = filtered.filter(c => !randomFlipped[c.id]).length;
    const allDone = total > 0 && unflipped === 0;
    bar.innerHTML =
      `Seen ${seenCount}/${total} · ${totalViews} views this week` +
      (allDone ? '  ·  ✅ All done!' : `  ·  ${unflipped} left`) +
      `  <span class="reset-counts" onclick="resetCounts()">Reset</span>`;
  } else {
    bar.textContent = '';
  }
}

// ==================== RENDER: DETAIL ====================
function openDetail(cardId) {
  const card = CARDS.find(c => c.id === cardId);
  if (!card) return;
  state.currentCard = card;

  const overlay = document.createElement('div');
  overlay.className = 'detail-overlay';
  overlay.id = 'detailOverlay';

  let itemsHtml = '';
  for (const item of card.items) {
    const safeW = item.w.replace(/'/g, "\\'");
    const safeS = item.s.replace(/'/g, "\\'");
    itemsHtml += `<div class="item-row" onclick="speak('${safeW}')">
      <div class="item-word">${item.w} <span class="item-cn">${item.c}</span> <span class="speaker">🔊</span></div>
      <div class="item-sentence" onclick="event.stopPropagation(); speak('${safeS}')">${item.s} <span class="speaker">🔊</span></div>
      <div class="item-sc">${item.sc || ''}</div>
    </div>`;
  }

  const filtered = getFilteredCards();
  const curIdx = filtered.findIndex(c => c.id === cardId);
  const prevId = curIdx > 0 ? filtered[curIdx - 1].id : null;
  const nextId = curIdx < filtered.length - 1 ? filtered[curIdx + 1].id : null;

  overlay.innerHTML = `
    <div class="detail-card ${state.mode === 'random' ? 'flip-anim' : ''}">
      <div class="detail-top">
        <div class="detail-header">
          <div class="detail-title-group">
            <span class="detail-title">${card.label}</span>
            <span class="detail-sound">${card.sound}</span>
          </div>
          <div class="detail-header-actions">
            <button class="cn-toggle" onclick="toggleCn(this)">译</button>
            <button class="detail-close btn" onclick="closeDetail()">✕</button>
          </div>
        </div>
      </div>
      <div class="detail-scroll">
        <div class="detail-items">
          ${itemsHtml}
        </div>
      </div>
      <div class="detail-nav"></div>
      ${state.mode === 'random'
        ? `<button class="nav-big-next" onclick="randomNext()">Next<br>Card</button>`
        : `<button class="nav-arrow nav-arrow-prev" onclick="navTo('${prevId}')" ${prevId ? '' : 'style="opacity:0.08;pointer-events:none"'}>←</button>
           <button class="nav-arrow nav-arrow-next" onclick="navTo('${nextId}')" ${nextId ? '' : 'style="opacity:0.08;pointer-events:none"'}>→</button>`
      }
    </div>`;

  document.body.appendChild(overlay);
  // Lock background scroll
  document.body.style.overflow = 'hidden';

  // Swipe support on mobile
  let touchStartX = 0;
  overlay.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive: true});
  overlay.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) < 50) return;
    if (state.mode === 'browse') {
      navTo(diff > 0 ? nextId : prevId);
    } else if (state.mode === 'random' && diff > 0) {
      randomNext();
    }
  }, {passive: true});
}

function closeDetail() {
  const el = document.getElementById('detailOverlay');
  if (el) el.remove();
  document.body.style.overflow = '';
  state.currentCard = null;
}

function navTo(id) {
  closeDetail();
  if (id) openDetail(id);
}

// ==================== RANDOM LOGIC ====================
function randomNext() {
  closeDetail();
  const filtered = getFilteredCards();
  const unflipped = filtered.filter(c => !randomFlipped[c.id]);
  let pool = unflipped.length > 0 ? unflipped : filtered;

  pool.sort((a, b) => getCount(a.id) - getCount(b.id));
  const pick = pool[Math.floor(Math.random() * Math.min(5, pool.length))];

  if (pick) {
    randomFlipped[pick.id] = true;
    incrementCount(pick.id);
    renderWall();
    openDetail(pick.id);
  }
}

function clickTile(id) {
  if (state.mode === 'random') {
    if (!randomFlipped[id]) {
      randomFlipped[id] = true;
      incrementCount(id);
      renderWall();
    }
    openDetail(id);
  } else {
    openDetail(id);
  }
}

// ==================== MODE / FILTER ====================
function setMode(mode) {
  state.mode = mode;
  document.getElementById('modeBrowse').className = 'mode-btn' + (mode === 'browse' ? ' mode-btn-active' : '');
  document.getElementById('modeRandom').className = 'mode-btn' + (mode === 'random' ? ' mode-btn-active' : '');
  if (mode === 'random') randomFlipped = {};
  closeDetail();
  renderWall();
}

function setFilter(filter) {
  state.filter = filter;
  if (state.mode === 'random') randomFlipped = {};
  closeDetail();
  renderWall();
}

function toggleCn(btn) {
  const overlay = btn.closest('.detail-overlay');
  if (!overlay) return;
  btn.classList.toggle('active');
  overlay.querySelector('.detail-items').classList.toggle('show-cn');
}

function toggleVoice() {
  state.voiceType = state.voiceType === 'uk' ? 'us' : 'uk';
  document.getElementById('voiceBtn').textContent = state.voiceType === 'uk' ? 'UK' : 'US';
}

// ==================== DATA EXPORT/IMPORT ====================
function toggleDataMenu() {
  document.getElementById('dataMenu').classList.toggle('show');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.data-btn')) document.getElementById('dataMenu').classList.remove('show');
});

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function exportData() {
  const stats = getStats();
  const data = { stats, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `phonics-stats-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ 数据已导出');
  document.getElementById('dataMenu').classList.remove('show');
}

document.getElementById('importFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.stats || !data.stats.counts) {
        showToast('❌ 无效的备份文件');
        return;
      }
      localStorage.setItem('phonics_stats', JSON.stringify(data.stats));
      randomFlipped = {};
      renderWall();
      showToast('✅ 数据已导入');
    } catch (err) {
      showToast('❌ 文件解析失败');
    }
  };
  reader.readAsText(file);
  this.value = '';
  document.getElementById('dataMenu').classList.remove('show');
});

// ==================== INIT ====================
function initFilters() {
  const container = document.getElementById('filters');
  const cats = [
    { id: 'all', label: 'All' },
    { id: 'letter', label: 'Letters' },
    { id: 'short', label: 'Short' },
    { id: 'long', label: 'Long' },
    { id: 'vowel', label: 'Vowel' },
    { id: 'consonant', label: 'Consonant' },
  ];
  for (const cat of cats) {
    const count = cat.id === 'all' ? CARDS.length : CARDS.filter(c => c.cat === cat.id).length;
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm' + (cat.id === 'all' ? ' btn-active' : '');
    btn.textContent = `${cat.label} (${count})`;
    btn.onclick = () => {
      container.querySelectorAll('.btn').forEach(b => b.classList.remove('btn-active'));
      btn.classList.add('btn-active');
      setFilter(cat.id);
    };
    container.appendChild(btn);
  }
}

initFilters();
renderWall();
</script>
